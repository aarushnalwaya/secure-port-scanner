<!DOCTYPE html>
<html>
<head>
    <title>Custom Port Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        input {
            padding: 6px;
            margin-bottom: 10px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        ul {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h2>Custom Port Scanner</h2>

<form method="POST">

<label>Target IP:</label><br>
<input type="text" name="target" required><br>

<label>Start Port:</label><br>
<input type="number" name="start_port" required><br>

<label>End Port:</label><br>
<input type="number" name="end_port" required><br>

<button type="submit">Scan</button>

</form>

<h3>Results:</h3>

<ul>
{% for r in results %}
<li>{{ r }}</li>
{% endfor %}
</ul>

</body>
</html>
